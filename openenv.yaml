# ─────────────────────────────────────────
# OpenEnv Specification File
# ─────────────────────────────────────────

name: misinfo-containment-env
version: 2.0.0
description: >
  A simulated hidden-markov social network where misinformation spreads.
  Agents must reason over semantic content, demographic vulnerability,
  and epistemic uncertainty to reconstruct causal chains and contain outbreaks.

author: sentinel-team
license: MIT
tags:
  - openenv
  - causal-inference
  - misinformation
  - epistemic-calibration

# ─────────────────────────────────────────
# ENVIRONMENT INTERFACE
# ─────────────────────────────────────────

interface:
  reset:
    description: >
      Resets environment to clean initial state.
      Pre-generates network, establishes origin, and
      returns an initial stream of reports.
    returns: Observation

  step:
    description: >
      Executes one agent action. Returns updated
      Observation, Reward, done flag, and info dict.
    input: Action
    returns:
      - Observation
      - Reward
      - bool
      - dict

  state:
    description: >
      Returns full internal environment state
      including graph ground truth.
    returns: EnvironmentState

# ─────────────────────────────────────────
# OBSERVATION SPACE
# ─────────────────────────────────────────

observation_space:
  task_id:
    type: string
    enum:
      - task1_detection
      - task2_tracing
      - task3_containment
    description: Currently active task

  step_number:
    type: integer

  max_steps:
    type: integer

  actions_remaining:
    type: integer
    nullable: true

  stream_reports:
    type: list
    items: string
    description: >
      Partial observability constraint. Instead of a full
      network graph, the agent receives a list of node IDs
      that were flagged by the platform's heuristics this turn.

  inspection_results:
    type: dict
    nullable: true
    description: >
      If the agent used the 'inspect' action, this field
      returns the semantic and demographic payload.
      Keys are node_ids, values contain 'recent_post',
      'user_persona', and 'skepticism_score'.

  financial_budget:
    type: float
    description: Remaining financial budget for operations. Episode ends when it drops below 0.

  public_outrage_index:
    type: float
    description: Tracks Streisand effect. High outrage triggers adverserial evasion.

# ─────────────────────────────────────────
# ACTION SPACE
# ─────────────────────────────────────────

action_space:
  action_type:
    type: string
    enum:
      - inspect
      - trace
      - quarantine
      - remove
      - shadowban
      - deploy_counter_narrative
      - submit_causal_chain
    descriptions:
      inspect: Read the semantic text post and demographic metadata of a node.
      trace: Request graph topology data (betweenness centrality, bridges).
      quarantine: Isolate node. Costly action.
      remove: Permanently sever node from graph. Very costly.
      shadowban: Reduces influence by 80% without deleting the node. Low risk.
      deploy_counter_narrative: Expensive global action to lower skepticism of an entire community.
      submit_causal_chain: >
        Submit a directed edge list showing exactly how the
        infection propagated from origin to the current state.

  target_node_id:
    type: string
    nullable: true
    description: ID of node to act upon. Null if submitting causal chain.

  confidence:
    type: float
    range: [0.0, 1.0]
    description: >
      MANDATORY. Agent's probability estimate that this action is
      correct. Scored via Brier Calibration. Overconfidence on
      incorrect actions results in catastrophic penalties.

  causal_chain:
    type: list
    nullable: true
    description: >
      List of dicts {"from": str, "to": str} representing
      the inferred propagation path. Used with submit_causal_chain.

  task_restrictions:
    task1_detection:
      allowed: [inspect, quarantine]
    task2_tracing:
      allowed: [inspect, trace, quarantine, submit_causal_chain]
    task3_containment:
      allowed: [inspect, trace, quarantine, remove, shadowban, deploy_counter_narrative, submit_causal_chain]
      budget: 5 actions per spread step

# ─────────────────────────────────────────
# REWARD SPACE
# ─────────────────────────────────────────

reward_space:
  score:
    type: float
    range: [-1.0, 1.0]
    description: Calibration-adjusted episode score
  
  delta:
    type: float

  done:
    type: boolean

  success:
    type: boolean

  partial_credits:
    type: dict
    description: Breakdown including Brier score, timing loss, and structural accuracy.

  feedback:
    type: string

# ─────────────────────────────────────────
# TASKS
# ─────────────────────────────────────────

tasks:
  - id: task1_detection
    difficulty: easy
    max_steps: 10
    network_size: 40
    description: >
      Network is Watts-Strogatz. Agent must use limited inspections
      to quarantine nodes showing malicious intent across 5 content tiers.
    success_criteria: "Quarantine precision > 0.8"

  - id: task2_tracing
    difficulty: medium
    max_steps: 15
    network_size: 80
    description: >
      Network is Barabasi-Albert. Agent must reconstruct the exact causal
      path of the misinformation using submit_causal_chain.
    success_criteria: "Graph Edit Distance of causal chain < 2"

  - id: task3_containment
    difficulty: hard
    max_steps: 20
    network_size: 150
    actions_per_step: 3
    description: >
      Mixed topology with implanted bridge nodes. Agent must
      identify Coordinated Inauthentic Behavior clusters, quarantine
      bridges, and submit accurate causal chains. Bots may 'go dark'.
    success_criteria: "CIB cluster identified AND threshold not breached"

# ─────────────────────────────────────────
# RUNTIME & DEPLOYMENT
# ─────────────────────────────────────────

runtime:
  python: "3.11"
  hardware:
    vcpu: 2
    memory_gb: 8

deployment:
  platform: huggingface-spaces
  port: 7860